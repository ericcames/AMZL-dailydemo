---
controller_credential_types:
  - name: "AMZL Daily Demo - Secrets"
    description: "Injects DEVOPS_PASSWORD, LINUX_SSH_PUBLIC_KEY, AWS_TF_STATE_BUCKET and AWS_DEFAULT_REGION for the AMZL demo playbooks"
    kind: cloud
    inputs:
      fields:
        - id: devops_password
          type: string
          label: "devops account password"
          secret: true
        - id: linux_ssh_public_key
          type: string
          label: "Authorized SSH public key for devops"
        - id: aws_tf_state_bucket
          type: string
          label: "Terraform S3 state bucket"
        - id: aws_default_region
          type: string
          label: "AWS region"
      required:
        - devops_password
        - linux_ssh_public_key
    injectors:
      env:
        DEVOPS_PASSWORD: !unsafe '{{devops_password}}'
        LINUX_SSH_PUBLIC_KEY: !unsafe '{{linux_ssh_public_key}}'
        AWS_TF_STATE_BUCKET: !unsafe '{{aws_tf_state_bucket}}'
        AWS_DEFAULT_REGION: !unsafe '{{aws_default_region}}'
