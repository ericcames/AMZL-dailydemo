---
controller_projects:
  - name: "{{ project_name }}"
    organization: "{{ my_organization }}"
    scm_type: git
    scm_url: "https://github.com/ericcames/AMZL-dailydemo.git"
    scm_branch: main
    # Explicitly false (not omitted) — the CaC role only changes fields it's
    # given, so omitting this would leave a previously-enabled value in place.
    # No update-on-launch: sync explicitly (manual or project_update) so a
    # workflow run doesn't git pull before every node — deterministic, no
    # per-node sync overhead.
    scm_update_on_launch: false
    scm_clean: true
    default_environment: "{{ my_execution_environment }}"
