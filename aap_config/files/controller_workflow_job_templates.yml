---
# NOTE: the infra.aap_configuration role uses `controller_workflows`.
#
# ── AMZL Daily Demo — Provision and Configure ─────────────────────────────────
#
#   Provision VM (AWS Terraform)
#     └─►success─► Patch to target release
#           └─►success─► Security hardening
#                 └─►success─► Create devops user
#                       └─►success─► Deploy Docker webserver
#
# A single workflow-level survey collects vm_size + amzl_target_release once and
# propagates them to the relevant nodes. Any node failing stops the chain.
controller_workflows:
  - name: "{{ workflow_name }}"
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    survey_enabled: true
    survey_spec:
      name: ""
      description: "Amazon Linux 2023 VM size and target patch release"
      spec:
        - question_name: VM size
          question_description: "Amazon Linux 2023 t-shirt size on AWS"
          variable: vm_size
          type: multiplechoice
          required: true
          default: medium
          choices:
            - small
            - medium
            - large
        - question_name: Target release
          # Static menu of recent AL2023 releases. `dnf update --releasever` only
          # moves forward, so we list the newest point releases (older ones would
          # no-op against a latest SSM AMI). Refresh from the AL2023 release notes
          # as new builds ship: docs.aws.amazon.com/linux/al2023/release-notes/
          question_description: "AL2023 release to patch to ('latest' for newest, or pin to a specific tested release)"
          variable: amzl_target_release
          type: multiplechoice
          required: true
          default: "2023.12.20260622"
          choices:
            - latest
            - "2023.12.20260629"
            - "2023.12.20260622"
            - "2023.12.20260611"
    simplified_workflow_nodes:
      - identifier: provision
        unified_job_template: "{{ jt_provision }}"
        success_nodes:
          - patch

      - identifier: patch
        unified_job_template: "{{ jt_patch }}"
        success_nodes:
          - harden

      - identifier: harden
        unified_job_template: "{{ jt_harden }}"
        success_nodes:
          - devops_user

      - identifier: devops_user
        unified_job_template: "{{ jt_devops_user }}"
        success_nodes:
          - docker_web

      - identifier: docker_web
        unified_job_template: "{{ jt_docker_web }}"
