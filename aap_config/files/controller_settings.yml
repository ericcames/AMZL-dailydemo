---
# ============================================================================
# AMZL-dailydemo — Controller settings as code
# ============================================================================
# Consumed by the infra.aap_configuration.controller_settings role (part of the
# dispatch run in load.yml). Enables Automation Analytics / Insights so the
# **Automation Calculator** (ROI planner on console.redhat.com) has data.
#
# Auth to console.redhat.com is via a Red Hat **service account** (client
# ID/secret), per Red Hat's current guidance — the legacy portal
# username/password fields are explicitly cleared so the service account is the
# single, unambiguous analytics identity. Secrets resolve at runtime from env
# vars via group_vars/all.yml; secure logging is forced on so the client secret
# never lands in job output. Pattern sourced from dc1.azure.
#
# NOTE — the calculator only shows data AFTER at least one analytics upload has
# run (default gather interval 4h; force one from Settings → Subscription) and
# some job templates have generated telemetry.
controller_settings_secure_logging: true

controller_settings:
  settings:
    # Master switch: gather analytics locally and ship to console.redhat.com.
    INSIGHTS_TRACKING_STATE: true
    # Service-account auth (client ID/secret). Legacy portal username/password
    # cleared to avoid precedence conflicts. SUBSCRIPTIONS_CLIENT_SECRET is
    # write-only — AAP returns $encrypted$ on read.
    REDHAT_USERNAME: ""
    REDHAT_PASSWORD: ""
    SUBSCRIPTIONS_CLIENT_ID: "{{ redhat_subscriptions_client_id }}"
    SUBSCRIPTIONS_CLIENT_SECRET: "{{ redhat_subscriptions_client_secret }}"
