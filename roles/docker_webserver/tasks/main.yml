---
- name: Install the Docker engine and pip
  ansible.builtin.dnf:
    name:
      - docker
      - python3-pip
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Install the Docker SDK for Python (required by community.docker)
  ansible.builtin.pip:
    name: docker
    state: present

- name: Ensure the devops user is in the docker group
  ansible.builtin.user:
    name: "{{ docker_webserver_user }}"
    groups: docker
    append: true

- name: Create the web content directory
  ansible.builtin.file:
    path: "{{ docker_webserver_content_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render the demo index.html
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ docker_webserver_content_dir }}/index.html"
    owner: root
    group: root
    mode: "0644"

- name: Pull the webserver image
  community.docker.docker_image:
    name: "{{ docker_webserver_image }}"
    source: pull

- name: Run the webserver container
  community.docker.docker_container:
    name: "{{ docker_webserver_container_name }}"
    image: "{{ docker_webserver_image }}"
    state: started
    restart_policy: unless-stopped
    recreate: true
    published_ports:
      - "{{ docker_webserver_host_port }}:{{ docker_webserver_container_port }}"
    volumes:
      - "{{ docker_webserver_content_dir }}:/var/www/html:Z"
